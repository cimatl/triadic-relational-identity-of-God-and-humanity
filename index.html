let L='en',P=0,DM={0:'where',1:'where'},CI=0,SR=0,RS={};
function t(){return D[L]}
function bg(d){return`<span class="badge b${d==='WHERE'?'w':d==='WHO'?'h':'a'}">${d}</span>`}
function mc(m){return m.includes('TOWARD')||m.includes('향')||m.includes('DESCEND')||m.includes('내려')?'mt':m.includes('AWAY')||m.includes('떠')?'ma':m.includes('◎')?'mp':'ma'}

function R(){const d=t(),ps=[d.p1,d.p2,d.p3,d.p4,d.p5],p=ps[P];
let h=`<header class="hdr"><div class="hdr-top"><div><div class="hdr-title">${d.title}</div><div class="hdr-sub">${d.subtitle}</div></div><button class="lang-btn" onclick="TL()">${d.lb}</button></div><div class="nav-row">`;
d.nav.forEach((n,i)=>{h+=`<button class="nav-btn${P===i?' on':''}" onclick="GP(${i})">${ps[i].icon} ${n}</button>`});
h+=`</div></header><div class="content" id="C"><div class="part-hdr"><span class="part-icon">${p.icon}</span><span class="part-title">${p.title}</span></div>`;
h+=[R1,R2,R3,R4,R5][P](p);
h+=`<div class="nb">${P>0?`<button class="np" onclick="GP(${P-1})">${d.pv}</button>`:''}${P<4?`<button class="nn" onclick="GP(${P+1})">${d.nx}</button>`:''}</div></div><div class="ftr">${d.desc}</div>`;
document.getElementById('app').innerHTML=h}

function V(v,dm){const c=dm==='where'?'w':dm==='who'?'h':'a';return`<div class="vc"><span class="vr vr${c}">${v.r}</span><div class="vt">${v.t}<span class="mo ${mc(v.m)}">${v.m}</span></div></div>`}
function AC(title,body,color,open){return`<div class="ac"><button class="ah" style="color:${color}" onclick="this.nextElementSibling.style.display=this.nextElementSibling.style.display==='none'?'block':'none';this.querySelector('.aw').classList.toggle('op')">${title}<span class="aw${open?' op':''}">▾</span></button><div class="ab"${open?'':' style="display:none"'}>${body}</div></div>`}

function R1(p){const dm=DM[0],dd=p.dims[dm],fc=dm==='where'?'fw':dm==='who'?'fh':'fa',pc=dm==='where'?'pw':dm==='who'?'ph':'pa';
let h=`<div class="intro">${p.intro}</div><div class="idet">${p.id}</div>`;
let eb=`<p class="sdsc">${p.ex.d}</p><div class="cd" style="border-left:3px solid var(--wm)">${bg('WHERE')} ${p.ex.w}</div><div class="cd" style="border-left:3px solid var(--am)">${bg('WHAT')} ${p.ex.a}</div><div class="cd" style="border-left:3px solid var(--hm)">${bg('WHO')} ${p.ex.h}</div>`;
h+=AC(p.ex.t,eb,'var(--gold)',true);
h+=`<div class="dtabs"><button class="dtab ${dm==='where'?'ow':'xw'}" onclick="SD(0,'where')">WHERE</button><button class="dtab ${dm==='who'?'oh':'xh'}" onclick="SD(0,'who')">WHO</button><button class="dtab ${dm==='what'?'oa':'xa'}" onclick="SD(0,'what')">WHAT</button></div>`;
h+=`<div class="dp ${pc}" style="animation:fu .4s">${bg(dm.toUpperCase())}<span class="dtl">${dd.t}</span><div class="ctx">${dd.c}</div>`;
dd.vs.forEach(v=>{h+=V(v,dm)});
h+=`<div class="fm ${fc}"><p>${dd.f}</p></div></div>`;
h+=RF(p.rl,0);return h}

function R2(p){const dm=DM[1],dd=p.dims[dm],fc=dm==='where'?'fw':dm==='who'?'fh':'fa',pc=dm==='where'?'pw':dm==='who'?'ph':'pa';
let h=`<div class="intro">${p.intro}</div><div class="idet">${p.md}</div>`;
h+=`<div class="dtabs"><button class="dtab ${dm==='where'?'ow':'xw'}" onclick="SD(1,'where')">WHERE</button><button class="dtab ${dm==='who'?'oh':'xh'}" onclick="SD(1,'who')">WHO</button><button class="dtab ${dm==='what'?'oa':'xa'}" onclick="SD(1,'what')">WHAT</button></div>`;
h+=`<div class="dp ${pc}">${bg(dm.toUpperCase())}<span class="dtl">${dd.t}</span><div class="ctx">${dd.c}</div><div class="fm ${fc}"><p>${dd.k}</p></div>`;
if(dd.ps)dd.ps.forEach(x=>{h+=`<div class="pt"><div class="ptg">✦ ${x.g}</div><div class="ptr"><div class="pti">→ ${x.h}</div><div class="pta">✗ ${x.a}</div></div></div>`});
if(dd.fs)dd.fs.forEach(f=>{let b=`<div class="fr">${bg('WHERE')}<span>${f.w}</span></div><div class="fr">${bg('WHAT')}<span>${f.a}</span></div><div class="fr">${bg('WHO')}<span style="font-weight:700">${f.wh}</span></div>`;h+=AC(f.n,b,'var(--hm)',false)});
if(dd.cs)dd.cs.forEach(c=>{h+=`<div class="co"><div class="cg">⚡ ${c.g}</div><div class="ch">→ ${c.h}</div><div class="cw">📍 ${c.w}</div><div class="cwh">= ${c.wh}</div></div>`});
h+=`</div>`;h+=RF(p.rl,1);return h}

function R3(p){let h=`<div class="intro">${p.intro}</div><div class="stl" style="color:var(--am)">${p.fl.t}</div><div class="sdsc">${p.fl.d}</div>`;
p.fl.rs.forEach(r=>{h+=`<div class="fc"><div class="fch">${bg(r.d)}</div><div class="fcg"><div class="fcc"><div class="fcl" style="color:var(--wm)">●</div>${r.b}</div><div class="fcc"><div class="fcl" style="color:var(--am)">○</div>${r.a}</div></div></div>`});
h+=`<div class="stl" style="color:var(--wm);margin-top:20px">${p.sv.t}</div><div class="sdsc">${p.sv.d}</div>`;
p.sv.es.forEach((e,i)=>{let b=`<div class="fr">${bg('WHERE')}<span>${e.w}</span></div><div class="fr">${bg('WHO')}<span>${e.h}</span></div><div class="fr">${bg('WHAT')}<span>${e.a}</span></div>`;h+=AC(e.e,b,'var(--wm)',i===0)});
let cb=`<p class="sdsc">${p.ch.d}</p><div class="cd" style="border-left:3px solid var(--wm)">${bg('WHERE')} ${p.ch.w}</div><div class="cd" style="border-left:3px solid var(--hm)">${bg('WHO')} ${p.ch.h}</div><div class="cd" style="border-left:3px solid var(--am)">${bg('WHAT')} ${p.ch.a}</div><div class="cphi">${p.ch.ph}</div>`;
h+=AC(p.ch.t,cb,'var(--gold)',true);h+=RF(p.rl,2);return h}

function R4(p){let h=`<div class="intro">${p.intro}</div><div class="ctabs">`;
p.cc.forEach((c,i)=>{const s=i===CI,cv=c.cl==='w'?'--wp':c.cl==='h'?'--hp':'--ap',cm=c.cl==='w'?'--wm':c.cl==='h'?'--hm':'--am';
h+=`<button class="ctab" style="background:${s?`var(${cv})`:'var(--surf)'};color:${s?'#fff':`var(${cm})`};border-color:${s?`var(${cv})`:'transparent'}" onclick="SC(${i})">${c.tm.split(' ')[0]}<div class="csub">${c.dm}</div></button>`});
h+=`</div>`;const cc=p.cc[CI],pc=cc.cl==='w'?'pw':cc.cl==='h'?'ph':'pa',cm=cc.cl==='w'?'var(--wm)':cc.cl==='h'?'var(--hm)':'var(--am)',cv=cc.cl==='w'?'var(--wp)':cc.cl==='h'?'var(--hp)':'var(--ap)';
h+=`<div class="dp ${pc}"><div style="display:flex;align-items:center;gap:8px;margin-bottom:8px"><span style="font-size:20px;font-weight:700;color:${cv}">${cc.tm}</span>${bg(cc.dm)}</div><div style="font-size:14px;font-weight:600;margin-bottom:12px">${cc.df}</div>`;
const al=L==='ko'?['공간적 읽기','삼중적 의미','성경적 유사점','회복의 길']:['Spatial Reading','Triadic Significance','Biblical Parallels','Restoration'];
[cc.sp,cc.tr,cc.bb,cc.rt].forEach((x,i)=>{h+=AC(al[i],x,cm,i===0)});
h+=`</div>`;h+=RF(p.rl,3);return h}

function R5(p){const d=t();let h=`<div class="intro">${p.intro}</div>`;
const sc={g:'var(--gold)',h:'var(--hm)',a:'var(--am)',w:'var(--wm)'};
p.ss.forEach((s,i)=>{const sh=i<=SR;h+=`<button class="st ${sh?'op':'lk'}" style="border:1.5px solid ${sh?sc[s.c]+'66':'var(--bdr)'}" onclick="RV(${i})"><div class="sl" style="color:${sc[s.c]}">${s.l}</div>${sh?`<div class="stx">${s.t}</div>`:`<div class="sth">${d.tr}</div>`}</button>`});
if(SR>=4){h+=`<div class="fm fg"><p>${p.fm}</p></div><div class="fb"><div style="font-size:10px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--gold);margin-bottom:10px">${L==='ko'?'창세기 3:9의 대답':'The Answer to Genesis 3:9'}</div><div class="fq">${p.fQ}</div><div class="faa">${p.fA}</div><div class="fd">${p.fD}</div></div>`}
h+=RF(p.rl,4);return h}

function RF(pr,pid){const d=t(),k=`${L}_${pid}`;if(!RS[k])RS[k]={q:0,sv:[]};const s=RS[k];
let h=`<div class="rf"><div class="rfh"><span>💭</span><span class="rft">${d.rt}</span><span class="rfc">${s.q+1}/${pr.length}</span></div><div class="rfq">${pr[s.q]}</div><textarea id="rta" rows="3" placeholder="${d.rp}"></textarea><div class="rfa"><button class="rfs" onclick="SV(${pid})">${d.rs}</button><div class="rfd">`;
pr.forEach((_,i)=>{h+=`<span class="rdo${i===s.q?' on':''}" onclick="SQ(${pid},${i})"></span>`});
h+=`</div></div>`;
if(s.sv.length){h+=`<div class="rvd"><div class="rvt">${d.rv}:</div>`;s.sv.forEach(x=>{h+=`<div class="rve"><div class="rveq">${x.q}</div>${x.a}</div>`});h+=`</div>`}
return h+`</div>`}

function TL(){L=L==='en'?'ko':'en';R()}
function GP(i){P=i;R();setTimeout(()=>{const c=document.getElementById('C');if(c)c.scrollTop=0},50)}
function SD(p,v){DM[p]=v;R()}
function SC(i){CI=i;R()}
function RV(i){SR=Math.max(SR,i);R()}
function SV(pid){const k=`${L}_${pid}`,ta=document.getElementById('rta');if(!ta||!ta.value.trim())return;const d=t(),ps=[d.p1,d.p2,d.p3,d.p4,d.p5];RS[k].sv.push({q:ps[pid].rl[RS[k].q],a:ta.value.trim()});if(RS[k].q<ps[pid].rl.length-1)RS[k].q++;R()}
function SQ(pid,i){RS[`${L}_${pid}`].q=i;R()}
R();
</script>
</body>
